name: Node.js CI Pipeline

on:

push:
branches:
- main

pull_request:
branches:
- main

jobs:

build-test:

runs-on: ubuntu-latest

steps:

  - name: Checkout Source
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4

    with:
      node-version: 22

  - name: Install Dependencies
    run: npm install

  - name: Run ESLint
    run: npm run lint

  - name: Run Unit Tests
    run: npm test

  - name: Build Docker Image
    uses: docker/build-push-action@v6

    with:
      context: .
      push: false
      tags: node-demo:latest

